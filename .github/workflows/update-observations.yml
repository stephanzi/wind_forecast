name: Update buoy observations

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python scripts/update_observations.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update NDBC buoy observations"
          file_pattern: docs/current_observations.json
